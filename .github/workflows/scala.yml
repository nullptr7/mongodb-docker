# separate terms of service, privacy policy, and support
# documentation.

name: Scala CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
      - name: Compile
        run: sbt "cc"
      - name: Check formatting and linting
        run: sbt "checkFmt"
      - name: Test
        run: sbt "test"
